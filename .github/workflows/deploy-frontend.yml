name: deploy-frontend

on:
  # triggers the workflow on push to main
  push:
    branches: [ "main" ]

  # allow manual runs from Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # checkout repo in github actions runner
      - name: Checkout
        uses: actions/checkout@v6

      # install node.js
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # install dependencies
      - name: Install dependencies
        run: npm ci

      # builds the frontend
      - name: Build the frontend
        run: npm run build
        env:
          VITE_API_URL: https://d2emo6jszmk1pf.cloudfront.net:443

      # upload built pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:      
      # deploy pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
